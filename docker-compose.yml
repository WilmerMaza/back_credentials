name: credentials

services:
  # 🔹 Backend API (Accesible visualmente en puerto 3000)
  api:
    build: .
    image: back-credentials:latest
    container_name: api-credentials
    env_file: .env
    environment:
      NODE_ENV: production
    # 🚀 Sincronización segura de base de datos al iniciar
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"
    restart: unless-stopped

    ports:
      - "3000:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "PORT=$${PORT:-3000}; code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:$${PORT}/docs || exit 1); [ \"$${code}\" -lt 500 ]"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: "512M"

  # 🔹 Frontend (Angular + Nginx integrado - Accesible en puerto 80)
  frontend:
    build:
      context: ../frontend_credentials_21
    image: front-credentials:latest
    container_name: frontend-credentials
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
